body{min-height:100vh;background:#FFFFFF;color:#1e1e1e;font-family:'Pacaembu','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px 12px;-webkit-font-smoothing:antialiased}

.svq-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.svq-btn{padding:10px;border-radius:10px;cursor:pointer;text-align:left;border:1px solid #e2e8f0;background:#f8fafc;transition:.2s;touch-action:manipulation;min-height:48px;font-family:'Pacaembu',sans-serif}
.svq-btn.on{border-color:rgba(0,203,255,.4);background:rgba(0,203,255,.05)}
.svq-btn .t{font-size:11px;font-weight:400}.svq-btn.on .t{color:#00CBFF}.svq-btn:not(.on) .t{color:#1e1e1e}
.svq-btn .d{font-size:9px;margin-top:2px;line-height:1.3}.svq-btn.on .d{color:rgba(0,203,255,.7)}.svq-btn:not(.on) .d{color:#64748b}
.svq-btn .e{font-size:8px;margin-top:3px;color:#94a3b8;line-height:1.2}
.cap-box{padding:14px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0}
.cap-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}

.cap-hdr .v{font-size:clamp(18px,5vw,22px);font-weight:400;color:#00CBFF;font-family:monospace}
@media(max-width:480px){
  body{padding:16px 10px}

</style>

<script>
const PLANS=[{name:"Básico",mo:990,setup:18990,maxSv:3,sup:"Ticket / E-mail",addons:false},{name:"Padrão",mo:1590,setup:25990,maxSv:6,sup:"Chat / Ticket / E-mail",addons:true},{name:"Elite",mo:2390,setup:34990,maxSv:9,sup:"Chat / Ticket / E-mail / Telefone",addons:true}];
const PX=[{min:2,max:10,su:2200,mo:350},{min:11,max:20,su:2100,mo:300},{min:21,max:40,su:2000,mo:250}];
const VMP=[
  {label:"VPS Entrada",vcpu:1,ram:2,disk:30,pMin:50,pMax:80,price:65,desc:"Sites, blogs, apps leves"},
  {label:"VPS Básica",vcpu:2,ram:4,disk:50,pMin:80,pMax:150,price:120,desc:"Apps web, bancos leves"},
  {label:"VPS Intermediária",vcpu:4,ram:8,disk:100,pMin:150,pMax:300,price:220,desc:"ERPs, e-commerce"},
  {label:"VPS Avançada",vcpu:8,ram:16,disk:200,pMin:300,pMax:600,price:450,desc:"Alta performance, IA"}
];
const OCP=[{label:"Conservador",cpu:4,ram:1,desc:"Seguro"},{label:"Moderado",cpu:6,ram:1.5,desc:"Equilíbrio"},{label:"Agressivo",cpu:8,ram:2,desc:"Máx. densidade"}];
const SVC=[{label:"Novo",desc:"Garantia de fábrica",f:1},{label:"Recondicionado",desc:"Até 50% mais barato",f:0.55}];
const SVQ=[
  {label:"Básico",desc:"Xeon E / Ryzen",ex:"Dell T140, HP ML30",base:4500,cpu:220,ram:22,disk:0.35},
  {label:"Intermediário",desc:"Xeon Silver / EPYC 7002",ex:"Dell R640, HP DL360 G10",base:8000,cpu:420,ram:30,disk:0.55},
  {label:"Avançado",desc:"Xeon Gold / EPYC 7003",ex:"Dell R750, HP DL380 G10+",base:14000,cpu:700,ram:38,disk:0.80},
  {label:"Enterprise",desc:"EPYC 9004 / Xeon Platinum",ex:"Dell R760, Supermicro",base:20000,cpu:1100,ram:48,disk:1.20}
];

let st={mode:"existing",step:1,cpu:32,ram:128,disk:2000,ocCpu:4,ocRam:1,servers:3,vmP:1,custVm:false,vVcpu:2,vRam:4,vDisk:50,price:120,occ:70,planI:0,prox:false,svCond:0,svQual:1,svOver:false,svCost:0,elec:250,inet:150};

const $=function(id){return document.getElementById(id)};
const fmt=function(v){return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:2})};
const fN=function(v){return Math.round(v).toLocaleString("pt-BR")};
function vm(){return st.custVm?{vcpu:st.vVcpu,ram:st.vRam,disk:st.vDisk}:VMP[st.vmP]}
function pxT(){for(var i=0;i<PX.length;i++){var t=PX[i];if(st.servers>=t.min&&st.servers<=t.max)return t;}return PX[2]}
function svPrice(){var q=SVQ[st.svQual],f=SVC[st.svCond].f;return Math.round((q.base+st.cpu*q.cpu+st.ram*q.ram+st.disk*q.disk)*f)}
function svBreak(){var q=SVQ[st.svQual],f=SVC[st.svCond].f;return{base:Math.round(q.base*f),cpu:Math.round(st.cpu*q.cpu*f),ram:Math.round(st.ram*q.ram*f),disk:Math.round(st.disk*q.disk*f),cpuU:Math.round(q.cpu*f),ramU:Math.round(q.ram*f),diskU:(q.disk*f).toFixed(2)}}
function getCost(){return st.svOver?st.svCost:svPrice()}

function calc(){
  var v=vm(),px=pxT(),s=st.servers,p=PLANS[st.planI],sc=getCost();
  var aR=st.ram*0.9*st.ocRam,aD=st.disk*0.95,aC=st.cpu*st.ocCpu;
  var bC=Math.floor(aC/v.vcpu),bR=Math.floor(aR/v.ram),bD=Math.floor(aD/v.disk);
  var mx=Math.max(0,Math.min(bC,bR,bD)),bn=mx===bR?"RAM":mx===bD?"Disco":"CPU";

function tblH(rows){
  return '<div class="tbl">'+rows.map(function(r){
    return '<div class="tr'+(r.h?' hl':'')+'">'+
      (r.sub?'<div><span class="l">'+r.l+'</span><div class="calc">'+r.sub+'</div></div>':'<span class="l">'+r.l+'</span>')+
      '<span class="v">'+r.v+'</span></div>';
  }).join('')+'</div>';
}
function barH(lb,u,t,un){
  var p=t>0?Math.min(u/t*100,100):0,w=p>90,c=w?"#fb923c":"#00CBFF",vc=w?"#fb923c":"#1e1e1e";
  return '<div class="bar-h"><span class="bar-l">'+lb+'</span><span class="bar-v" style="color:'+vc+'">'+fN(u)+'/'+fN(t)+' '+un+' ('+p.toFixed(0)+'%)</span></div><div class="bar-t"><div class="bar-f" style="width:'+p+'%;background:'+c+'"></div></div>';
}

function readInputs(){
  var g=function(id){var e=$(id);return e?+e.value:0};
  st.cpu=Math.max(1,g("i-cpu")||1);st.ram=Math.max(1,g("i-ram")||1);st.disk=Math.max(1,g("i-disk")||1);
  st.ocCpu=Math.max(0.5,g("i-occ")||4);st.ocRam=Math.max(0.1,g("i-ocr")||1);
  if(st.custVm){st.vVcpu=Math.max(1,g("i-vvc")||1);st.vRam=Math.max(1,g("i-vrm")||1);st.vDisk=Math.max(1,g("i-vdk")||1)}
  if(st.svOver)st.svCost=Math.max(0,g("i-svc")||0);
  st.elec=Math.max(0,g("i-elec")||0);st.inet=Math.max(0,g("i-inet")||0);
  render();
}

function renderSteps(){
  var ss=[{n:1,l:"Infra"},{n:2,l:"VMs"},{n:3,l:"Plano"},{n:4,l:"Resultado"}];
  $("stepsBar").innerHTML=ss.map(function(s,i){

    return '<div style="display:flex;align-items:center;'+(i<3?'flex:1':'')+'">'+
      '<button class="sdot '+(a?'on':'off')+'" onclick="S.go('+s.n+')">'+s.n+'</button>'+
      '<span class="slbl '+(a?'on':'off')+'">'+s.l+'</span>'+
      (i<3?'<div class="sline '+(d?'on':'off')+'"></div>':'')+
      '</div>';
  }).join("");
}

  '</div><div class="ins">PMEs brasileiras buscam VPS com suporte local. Com a Solvefy, capture essa demanda.</div></div>';

  h4+='<div class="card card-a"><div class="ctitle ctitle-a">Resumo</div><div class="summary">'+
  '<p style="margin:0 0 8px"><strong>'+s+' servidor(es)</strong> de <strong>'+st.cpu+' cores, '+st.ram+'GB RAM, '+fN(st.disk)+'GB</strong> (OC CPU '+st.ocCpu+':1, RAM '+st.ocRam+':1) → até <strong>'+fN(c.mx)+' VMs/serv.</strong> tipo <strong>'+vlbl+'</strong> ('+v.vcpu+'vCPU, '+v.ram+'GB, '+v.disk+'GB).</p>'+

  '<p style="margin:0">Custos '+fmt(c.tc)+' → <strong style="color:'+pc+'">lucro '+fmt(c.net)+'/mês ('+c.mg.toFixed(1)+'%)</strong>. 12 meses: <strong class="grn">'+fmt(c.aProf)+'</strong>.</p></div></div>';

  h4+='<div class="disc">* Overcommit CPU '+st.ocCpu+':1, RAM '+st.ocRam+':1, reserva 10% RAM e 5% disco. Dados: IMARC Group, AbraCloud, Grand View Research.</div>';
  h4+='<div class="nav" style="margin-top:16px"><button class="btn-sec" onclick="S.go(3)">← Ajustar</button></div>';
  $("page-4").innerHTML=h4;
