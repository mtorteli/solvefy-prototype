<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />

    <!--
      Consentimento de cookies (LGPD) + Google Consent Mode v2.
      Default = tudo negado até o visitante decidir no banner (CookieBanner.tsx).
      Em visitas seguintes, reaplica a escolha salva ANTES de qualquer hit do GA.
      O gtag.js carrega mesmo negado: nesse estado o GA não grava cookies
      (envia apenas pings sem cookie), conforme orientação do Consent Mode.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
      });
      // Escolha salva: JSON granular {"analytics":bool,"ads":bool} ou os
      // formatos legados "accepted"/"rejected" (tudo ou nada).
      function readCookiePrefs() {
        try {
          var raw = localStorage.getItem('solvefy_cookie_consent');
          if (!raw || raw === 'rejected') return null;
          if (raw === 'accepted') return { analytics: true, ads: true };
          var parsed = JSON.parse(raw);
          return { analytics: !!parsed.analytics, ads: !!parsed.ads };
        } catch (e) { return null; }
      }
      (function () {
        var prefs = readCookiePrefs();
        if (!prefs || (!prefs.analytics && !prefs.ads)) return;
        var ads = prefs.ads ? 'granted' : 'denied';
        gtag('consent', 'update', {
          ad_storage: ads,
          ad_user_data: ads,
          ad_personalization: ads,
          analytics_storage: prefs.analytics ? 'granted' : 'denied',
        });
      })();
    </script>

    <!-- Google Analytics 4 (gtag.js) — respeita o Consent Mode acima -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA4_ID%"></script>
    <script>
      gtag('js', new Date());
      gtag('config', '%VITE_GA4_ID%');
    </script>

    <!--
      Contentsquare — analytics e heatmap. Sem Consent Mode próprio, então só
      injetamos o script quando a categoria de análise é aceita.
      window.loadContentsquare é chamado pelo CookieBanner ao salvar a escolha.
    -->
    <script>
      (function () {
        function loadContentsquare() {
          if (window.__csqLoaded) return;
          window.__csqLoaded = true;
          var s = document.createElement('script');
          s.src = 'https://t.contentsquare.net/uxa/a53aefff5fd6e.js';
          s.async = true;
          document.head.appendChild(s);
        }
        window.loadContentsquare = loadContentsquare;
        var prefs = readCookiePrefs();
        if (prefs && prefs.analytics) loadContentsquare();
      })();
    </script>

    <!-- Google Search Console — verificação de propriedade do domínio -->
    <meta name="google-site-verification" content="qGA_pfU4wWRF79hbtxgsUsw-c9-PnffVE9hxITHX1hg" />

    <!--
      Title é o único fallback de conteúdo no shell: cobre o 200.html (catch-all
      para rotas não prerendadas) e dura até o react-helmet-async hidratar.
      Description, canonical, OG e Twitter são intencionalmente OMITIDOS aqui —
      são emitidos por <SEO /> em cada rota e duplicariam dentro do HTML
      prerendado se também viessem da shell.
    -->
    <title>Solvefy — Plataforma B2B de Comunicação Multicanal</title>

    <!-- Identidade visual -->
    <meta name="theme-color" content="#00df71" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Resource hints -->
    <!-- Pacaembu: fonte principal da marca (self-hosted), preload do peso 400 -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Pacaembu-Regular.woff2" crossorigin />
    <!-- CloudFront: RD Station Forms script carregado em /contato -->
    <link rel="preconnect" href="https://d335luupugsy2.cloudfront.net" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
