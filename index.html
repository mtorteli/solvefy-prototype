<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Google Analytics 4 (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA4_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA4_ID%');
    </script>

    <!--
      Title é o único fallback de conteúdo no shell: cobre o 200.html (catch-all
      para rotas não prerendadas) e dura até o react-helmet-async hidratar.
      Description, canonical, OG e Twitter são intencionalmente OMITIDOS aqui —
      são emitidos por <SEO /> em cada rota e duplicariam dentro do HTML
      prerendado se também viessem da shell.
    -->
    <title>Solvefy — Plataforma B2B de Comunicação Multicanal</title>

    <!-- Identidade visual -->
    <meta name="theme-color" content="#00df71" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Resource hints -->
    <!-- Pacaembu: fonte principal da marca (self-hosted), preload do peso 400 -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Pacaembu-Regular.woff2" crossorigin />
    <!-- CloudFront: RD Station Forms script carregado em /contato -->
    <link rel="preconnect" href="https://d335luupugsy2.cloudfront.net" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
