<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Em Breve</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts for Body -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "solve-green": "#70FC70",
              "solve-border": "#EFE6D8",
              "solve-sand": "#F7F5F2",
              "solve-black": "#000000",
            },
            fontFamily: {
              pacaembu: ["Pacaembu", "sans-serif"],
              "dm-sans": ['"DM Sans"', "sans-serif"],
            },
            animation: {
              marquee: "marquee 30s linear infinite",
            },
            keyframes: {
              marquee: {
                "0%": { transform: "translateX(0%)" },
                "100%": { transform: "translateX(-50%)" },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-solve-black text-white antialiased">
    <!-- Top Banner com Contador -->
    <div class="fixed top-0 left-0 w-full bg-solve-green text-solve-black py-3 px-4 z-50 flex items-center justify-center font-pacaembu font-bold text-sm md:text-base text-center shadow-lg uppercase tracking-wide">
      <span>Em breve uma nova marca para resolver sua comunicação: <span id="countdown" class="tabular-nums font-black ml-1"></span></span>
    </div>

    <div class="relative w-full max-w-full overflow-x-hidden min-h-screen flex flex-col items-center justify-between pt-[48px]">
      
      <!-- Decorative Vector (Assets Vector) -->
      <img
        src="assets/assets-vector.svg"
        alt=""
        class="absolute pointer-events-none z-0 w-[100px] h-[140px] right-[-32px] top-[-14px] md:w-[251px] md:h-[350px] md:right-[-60px] md:top-[10px]"
      />

      <!-- Main Content -->
      <main
        class="w-full max-w-[1240px] px-[16px] md:px-[20px] pt-[64px] pb-[60px] md:pt-[100px] md:pb-[100px] flex flex-col gap-[48px] relative z-10 flex-1 mx-auto"
      >
        <!-- Headers section -->
        <div class="flex flex-col gap-[24px] items-start w-full">
          <h1
            class="font-pacaembu text-solve-sand text-[32px] leading-[1.3] md:text-[48px] md:leading-[1.2] max-w-[879px]"
          >
            <span class="font-black">Mais perto</span> do seu cliente.<br />
            <span class="font-black">Mais rápido</span> para o seu negócio.
          </h1>
          <p
            class="font-dm-sans text-white text-[16px] leading-[1.6] md:text-[18px] md:leading-[1.6] max-w-[823px] font-normal"
          >
            Unifique soluções com um
            <strong class="font-bold">ecossistema completo!</strong>
            <strong class="font-bold">Conecte</strong>,
            <strong class="font-bold">integre</strong> e
            <strong class="font-bold">simplifique</strong> tecnologias para gerar
            performance real.
          </p>
        </div>

        <!-- Images block -->
        <div class="flex justify-between w-full h-[288px] md:h-[526px]">
          <div
            class="h-full rounded-[16px] md:rounded-[32px] overflow-hidden relative w-[63.2%] md:w-[62%] shrink-0"
          >
            <img
              src="assets/home-image.webp"
              class="absolute inset-0 w-full h-full object-cover object-[center_top]"
              alt="Interface Dashboard"
            />
          </div>
          <div
            class="h-full rounded-[16px] md:rounded-[32px] overflow-hidden relative w-[35.04%] md:w-[34.91%] shrink-0"
          >
            <img
              src="assets/green-image.webp"
              class="absolute inset-0 w-full h-full object-cover object-center"
              alt="Green Background"
            />
          </div>
        </div>

        <!-- Clients section -->
        <div
          class="w-full overflow-hidden relative pb-2 md:pb-0 [mask-image:_linear-gradient(to_right,transparent_0,_black_40px,_black_calc(100%-40px),transparent_100%)]"
        >
          <div
            class="flex min-w-full w-max animate-marquee hover:[animation-play-state:paused]"
          >
            <!-- First set -->
            <div
              class="flex items-center gap-[50px] md:gap-[80px] px-[25px] md:px-[40px] shrink-0"
            >
              <img
                src="assets/clients/china-box.svg"
                alt="China Box"
                class="h-[32px] md:h-[59px] w-auto shrink-0"
              />
              <img
                src="assets/clients/acordo-certo.svg"
                alt="Acordo Certo"
                class="h-[16px] md:h-[20px] w-auto shrink-0"
              />
              <img
                src="assets/clients/agibank.svg"
                alt="Agibank"
                class="h-[13px] md:h-[17px] w-auto shrink-0"
              />
              <img
                src="assets/clients/modal.svg"
                alt="Modal"
                class="h-[22px] md:h-[28px] w-auto shrink-0"
              />
              <img
                src="assets/clients/gendai.svg"
                alt="Gendai"
                class="h-[41px] md:h-[60px] w-auto shrink-0"
              />
              <img
                src="assets/clients/spoleto.svg"
                alt="Spoleto"
                class="h-[16px] md:h-[21px] w-auto shrink-0"
              />
              <img
                src="assets/clients/ixcsoft.svg"
                alt="IXC Soft"
                class="h-[18px] md:h-[23px] w-auto shrink-0"
              />
              <img
                src="assets/clients/chapecoense.svg"
                alt="Chapecoense"
                class="h-[40px] md:h-[60px] w-auto shrink-0"
              />
            </div>
            <!-- Second set -->
            <div
              class="flex items-center gap-[50px] md:gap-[80px] px-[25px] md:px-[40px] shrink-0"
            >
              <img
                src="assets/clients/china-box.svg"
                alt="China Box"
                class="h-[32px] md:h-[59px] w-auto shrink-0"
              />
              <img
                src="assets/clients/acordo-certo.svg"
                alt="Acordo Certo"
                class="h-[16px] md:h-[20px] w-auto shrink-0"
              />
              <img
                src="assets/clients/agibank.svg"
                alt="Agibank"
                class="h-[13px] md:h-[17px] w-auto shrink-0"
              />
              <img
                src="assets/clients/modal.svg"
                alt="Modal"
                class="h-[22px] md:h-[28px] w-auto shrink-0"
              />
              <img
                src="assets/clients/gendai.svg"
                alt="Gendai"
                class="h-[41px] md:h-[60px] w-auto shrink-0"
              />
              <img
                src="assets/clients/spoleto.svg"
                alt="Spoleto"
                class="h-[16px] md:h-[21px] w-auto shrink-0"
              />
              <img
                src="assets/clients/ixcsoft.svg"
                alt="IXC Soft"
                class="h-[18px] md:h-[23px] w-auto shrink-0"
              />
              <img
                src="assets/clients/chapecoense.svg"
                alt="Chapecoense"
                class="h-[40px] md:h-[60px] w-auto shrink-0"
              />
            </div>
          </div>
        </div>
      </main>

    <!-- Bottom Alternating Bar -->
    <div class="flex w-full h-[11px] md:h-[15px] shrink-0 mt-auto">
      <div class="w-[16.666%] h-full bg-solve-green"></div>
      <div class="w-[16.666%] h-full bg-solve-border"></div>
      <div class="w-[16.666%] h-full bg-solve-green"></div>
      <div class="w-[16.666%] h-full bg-solve-border"></div>
      <div class="w-[16.666%] h-full bg-solve-green"></div>
      <div class="w-[16.666%] h-full bg-solve-border flex-1"></div>
    </div>

    <!-- User script if any -->
    <script src="script.js"></script>
  </body>
</html>
