[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ──────────────────────────────────────────────────────────
# Canonical domain redirects (apex: https://solvefy.com)
# ──────────────────────────────────────────────────────────

[[redirects]]
  from = "https://www.solvefy.com/*"
  to = "https://solvefy.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.solvefy.com/*"
  to = "https://solvefy.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://solvefy.com/*"
  to = "https://solvefy.com/:splat"
  status = 301
  force = true

# ──────────────────────────────────────────────────────────
# Page redirects
# ──────────────────────────────────────────────────────────

[[redirects]]
  from = "/em-breve/termos-e-politicas.html"
  to = "/termos-e-politicas/"
  status = 301
  force = true

# ──────────────────────────────────────────────────────────
# Migração de marca: DisparoPro → Solvefy/Marketing (301 permanente)
# Estas regras só entram em vigor se disparopro.com.br estiver apontado
# para ESTE site Netlify (domain alias). Mapeamentos 1:1 de posts antigos
# devem ser adicionados ACIMA da regra geral, conforme os slugs forem
# confirmados — nada deve cair genericamente na home.
# ──────────────────────────────────────────────────────────

# (1:1) Posts do blog antigo → equivalentes em solvefy.com/blog.
#       Exemplo a adicionar quando o slug antigo for confirmado:
#       from = "https://disparopro.com.br/blog/<slug-antigo>"
#       to   = "https://solvefy.com/blog/<slug-novo>"

# Blog antigo (sem mapeamento específico) → índice do blog da Solvefy.
[[redirects]]
  from = "https://disparopro.com.br/blog/*"
  to = "https://solvefy.com/blog"
  status = 301
  force = true

[[redirects]]
  from = "https://www.disparopro.com.br/blog/*"
  to = "https://solvefy.com/blog"
  status = 301
  force = true

# Apex e demais caminhos → página do produto Solvefy/Marketing.
[[redirects]]
  from = "https://disparopro.com.br/*"
  to = "https://solvefy.com/marketing"
  status = 301
  force = true

[[redirects]]
  from = "https://www.disparopro.com.br/*"
  to = "https://solvefy.com/marketing"
  status = 301
  force = true

[[redirects]]
  from = "http://disparopro.com.br/*"
  to = "https://solvefy.com/marketing"
  status = 301
  force = true

[[redirects]]
  from = "http://www.disparopro.com.br/*"
  to = "https://solvefy.com/marketing"
  status = 301
  force = true

# SPA catch-all — redireciona para o shell do React (index.html).
# Rotas com HTML pré-renderizado (ex: /cpaas/index.html) são servidas
# diretamente pelo Netlify antes de cair aqui.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ──────────────────────────────────────────────────────────
# Cache-Control headers
# ──────────────────────────────────────────────────────────

# Hashed assets do build do Vite — cache imutável de 1 ano
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fontes auto-hospedadas — cache imutável de 1 ano
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imagens estáticas — cache curto com revalidação
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# HTML — sempre revalidar (importante para SPA shell sem stale content)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Arquivos SEO/GEO — atualizações precisam propagar rápido
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/.well-known/security.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "text/plain; charset=utf-8"
