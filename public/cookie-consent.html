<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Consent — Solvefy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f4f4f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Tokens ──────────────────────────────────────────────────────── */
    :root {
      --brand:        #00DF71;
      --brand-dark:   #00c063;
      --brand-light:  #e7fff3;
      --ink:          #111827;
      --ink-muted:    #6b7280;
      --border:       #e5e7eb;
      --surface:      #ffffff;
      --overlay:      rgba(0, 0, 0, 0.45);
      --radius-modal: 20px;
      --radius-btn:   10px;
      --shadow-modal: 0 24px 60px -12px rgba(0,0,0,0.18), 0 4px 16px -4px rgba(0,0,0,0.08);
    }

    /* ── Overlay ─────────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: var(--overlay);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9000;
      transition: opacity 0.25s ease;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    /* ── Modal ───────────────────────────────────────────────────────── */
    .modal {
      background: var(--surface);
      border-radius: var(--radius-modal);
      box-shadow: var(--shadow-modal);
      width: 100%;
      max-width: 460px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transform: translateY(0) scale(1);
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .overlay.hidden .modal {
      transform: translateY(16px) scale(0.97);
      opacity: 0;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.3;
    }
    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--brand-light);
      color: var(--brand-dark);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0,223,113,0.25);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .brand-badge svg { width: 13px; height: 13px; }

    /* ── Body text ───────────────────────────────────────────────────── */
    .modal-desc {
      font-size: 13.5px;
      color: var(--ink-muted);
      line-height: 1.6;
    }

    /* ── Cookie info box ─────────────────────────────────────────────── */
    .cookie-box {
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--ink-muted);
      line-height: 1.65;
      background: #fafafa;
    }
    .cookie-box strong { color: var(--ink); font-weight: 600; }

    /* ── Links row ───────────────────────────────────────────────────── */
    .links-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      align-items: center;
    }
    .links-row a {
      font-size: 12px;
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .links-row a:hover { opacity: 0.75; text-decoration: underline; }
    .links-row .divider {
      width: 1px; height: 12px;
      background: var(--border);
      display: inline-block;
    }

    /* ── Actions ─────────────────────────────────────────────────────── */
    .modal-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-options {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .btn-options:hover { color: var(--brand-dark); }

    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn {
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      padding: 9px 22px;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn-reject {
      background: var(--surface);
      color: var(--brand-dark);
      border: 2px solid var(--brand);
    }
    .btn-reject:hover {
      background: var(--brand-light);
    }
    .btn-accept {
      background: var(--brand);
      color: #fff;
      border: 2px solid var(--brand);
    }
    .btn-accept:hover {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
    }

    /* ── Floating cookie button ──────────────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 8999;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--brand);
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 20px -4px rgba(0,223,113,0.55), 0 2px 8px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.25s ease;
    }
    .fab:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 28px -4px rgba(0,223,113,0.65), 0 2px 8px rgba(0,0,0,0.12);
    }
    .fab.hidden { opacity: 0; pointer-events: none; transform: scale(0.8); }
    .fab svg { width: 26px; height: 26px; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .modal { padding: 22px 18px; }
      .modal-actions { flex-direction: column; align-items: flex-start; }
      .btn-group { width: 100%; }
      .btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ── Overlay + Modal ─────────────────────────────────────────────── -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <!-- Header -->
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Controle sua privacidade</h2>
        <span class="brand-badge">
          <!-- Solvefy mini-logo (wordmark dot) -->
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="7" fill="#00DF71" opacity="0.25"/>
            <circle cx="8" cy="8" r="4" fill="#00DF71"/>
          </svg>
          Solvefy
        </span>
      </div>

      <!-- Description -->
      <p class="modal-desc">
        Nosso site usa cookies para melhorar a navegação.
      </p>

      <!-- Cookie info box -->
      <div class="cookie-box">
        Usamos cookies para compartilhar dados de <strong>análise</strong>,
        <strong>publicidade</strong>, dados de usuários e
        <strong>personalização de anúncios</strong> com o Google.
      </div>

      <!-- Links -->
      <div class="links-row">
        <a href="https://disparopro.com.br/termos-e-politicas/" target="_blank" rel="noopener">Política de Privacidade</a>
        <span class="divider"></span>
        <a href="https://disparopro.com.br/termos-e-politicas/" target="_blank" rel="noopener">Política de Cookies</a>
        <span class="divider"></span>
        <a href="https://disparopro.com.br/termos-e-politicas/" target="_blank" rel="noopener">Termos de uso</a>
        <span class="divider"></span>
        <a href="https://disparopro.com.br/termos-e-politicas/" target="_blank" rel="noopener">Opt-out</a>
      </div>

      <!-- Actions -->
      <div class="modal-actions">
        <button class="btn-options" id="btn-options">Minhas opções</button>
        <div class="btn-group">
          <button class="btn btn-reject" id="btn-reject">Rejeitar</button>
          <button class="btn btn-accept" id="btn-accept">Aceitar</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Floating cookie button ──────────────────────────────────────── -->
  <button class="fab hidden" id="fab" title="Preferências de cookies" aria-label="Abrir preferências de cookies">
    <!-- Cookie SVG icon -->
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="13" fill="white" opacity="0.95"/>
      <!-- cookie body -->
      <path d="M16 5C10 5 5 10 5 16C5 22 10 27 16 27C22 27 27 22 27 16C27 13 26 11 24 9" stroke="#00DF71" stroke-width="2" stroke-linecap="round"/>
      <!-- bite -->
      <path d="M24 9C23 7.5 21.5 6.5 20 6C21 7 21.5 8.5 21 10C22.5 9.5 23.5 9 24 9Z" fill="#00DF71"/>
      <!-- chips -->
      <circle cx="12" cy="13" r="1.5" fill="#00DF71"/>
      <circle cx="17" cy="11" r="1.2" fill="#00DF71" opacity="0.7"/>
      <circle cx="11" cy="18" r="1.2" fill="#00DF71" opacity="0.7"/>
      <circle cx="18" cy="19" r="1.5" fill="#00DF71"/>
      <circle cx="14" cy="21" r="1" fill="#00DF71" opacity="0.6"/>
    </svg>
  </button>

  <script>
    const overlay   = document.getElementById('overlay');
    const fab       = document.getElementById('fab');
    const btnAccept = document.getElementById('btn-accept');
    const btnReject = document.getElementById('btn-reject');
    const btnOptions = document.getElementById('btn-options');

    function closeModal() {
      overlay.classList.add('hidden');
      fab.classList.remove('hidden');
    }

    function openModal() {
      overlay.classList.remove('hidden');
      fab.classList.add('hidden');
    }

    btnAccept.addEventListener('click', () => {
      localStorage.setItem('solvefy_cookie_consent', 'accepted');
      closeModal();
    });

    btnReject.addEventListener('click', () => {
      localStorage.setItem('solvefy_cookie_consent', 'rejected');
      closeModal();
    });

    btnOptions.addEventListener('click', () => {
      // Placeholder — aqui pode abrir um painel de configurações detalhadas
      alert('Painel de opções detalhadas (a implementar).');
    });

    fab.addEventListener('click', openModal);

    // Fechar ao clicar no overlay (fora do modal)
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });

    // Verificar consentimento prévio
    const saved = localStorage.getItem('solvefy_cookie_consent');
    if (saved) closeModal();
  </script>

</body>
</html>
