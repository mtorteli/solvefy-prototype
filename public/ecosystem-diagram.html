<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ecossistema Solvefy</title>
<style>
/* ── Pacaembu ── */
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Regular.woff2') format('woff2'),
       url('/fonts/Pacaembu-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Medium.ttf') format('truetype');
  font-weight: 500; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Black.woff2') format('woff2'),
       url('/fonts/Pacaembu-Black.ttf') format('truetype');
  font-weight: 900; font-style: normal; font-display: swap;
}

/* ── Design tokens ── */
:root {
  --ink-200:  #B6B9BC;
  --ink-300:  #8A8E92;
  --ink-400:  #5A5E62;
  --ink-900:  #0B0D0E;

  --paper-0:   #FFFFFF;
  --paper-50:  #FBFAF7;
  --paper-100: #F7F5F2;
  --paper-200: #F0EEE9;
  --paper-300: #E5E3DE;
  --paper-400: #D6D3CC;

  --bg-surface: var(--paper-0);
  --bg-inset:   var(--paper-100);

  --fg-default: var(--ink-900);
  --fg-muted:   var(--ink-400);

  --rule-subtle:  var(--paper-300);
  --rule-default: var(--paper-400);

  /* product palette */
  --brand-cpaas:        #9C7BFF;
  --brand-cpaas-bg:     #E7DBFF;
  --brand-ads:          #F0A800;
  --brand-ads-bg:       #FFF7E5;
  --brand-marketing:    #E64499;
  --brand-marketing-bg: #FFE9F5;
  --brand-crm:          #E1611C;
  --brand-crm-bg:       #FFDAC6;
  --brand-cloud:        #00CBFF;
  --brand-cloud-bg:     #C6E8F1;
  --brand-lead:         #00DF71;
  --brand-lead-bg:      #E7FFE7;

  /* local aliases */
  --c-cpaas:        var(--brand-cpaas);
  --c-cpaas-bg:     var(--brand-cpaas-bg);
  --c-ads:          var(--brand-ads);
  --c-ads-bg:       var(--brand-ads-bg);
  --c-marketing:    var(--brand-marketing);
  --c-marketing-bg: var(--brand-marketing-bg);
  --c-crm:          var(--brand-crm);
  --c-crm-bg:       var(--brand-crm-bg);
  --c-cloud:        var(--brand-cloud);
  --c-cloud-bg:     var(--brand-cloud-bg);
  --lead:           var(--brand-lead);
  --lead-bg:        var(--brand-lead-bg);

  /* typography — all Pacaembu */
  --font-sans: 'Pacaembu', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Pacaembu', ui-monospace, monospace;

  --text-2xs: 11px;
  --text-lg:  18px;

  --leading-tight: 1.08;
  --track-tight:  -0.02em;
  --track-caps:    0.08em;

  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 700;

  --s-1:    4px;
  --s-1_5:  6px;
  --s-2:    8px;
  --s-3:    12px;
  --s-4:    16px;
  --s-5:    20px;
  --s-6:    24px;
  --s-8:    32px;
  --s-10:   40px;

  --r-xs: 3px;
  --r-sm: 5px;
  --r-md: 6px;
  --r-lg: 10px;
  --r-pill: 9999px;

  --ease-out:    cubic-bezier(0.22, 0.8, 0.30, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-med:  200ms;
  --dur-slow: 400ms;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
body { font-family: var(--font-sans); color: var(--fg-default); -webkit-font-smoothing: antialiased; }

.wrap { width: 100%; }

/* ── Stage (transparent, borderless) ── */
.stage {
  position: relative;
  width: 100%;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: var(--s-8) var(--s-6) var(--s-10);
  overflow: visible;
}

/* ── Canvas ── */
.canvas { position: relative; width: 100%; height: 460px; }

.lines {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 1; pointer-events: none;
}

/* ── Nodes ── */
.node {
  position: absolute;
  top: 30%;
  transform: translateY(-50%);
  z-index: 4;
  background: var(--bg-surface);
  border: 1px solid var(--rule-subtle);
  border-radius: var(--r-lg);
  width: 19%;
  padding: var(--s-5);
  text-align: left;
  transition:
    box-shadow var(--dur-slow) var(--ease-out),
    transform  var(--dur-slow) var(--ease-out),
    border-color var(--dur-med) var(--ease-out),
    background   var(--dur-med) var(--ease-out);
}
.node::before {
  content: "";
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--c);
  border-radius: var(--r-lg) 0 0 var(--r-lg);
  transition: width var(--dur-med) var(--ease-out);
}
.node.active {
  border-color: var(--c);
  background: color-mix(in oklab, var(--c-bg) 55%, var(--bg-surface));
  box-shadow: 0 0 0 4px color-mix(in oklab, var(--c) 18%, transparent);
  transform: translateY(-50%) translateY(-3px);
}
.node.active::before { width: 5px; }
.node.active .ico {
  background: var(--c);
  color: var(--paper-0);
  transform: scale(1.05);
}
.node .ico {
  width: 36px; height: 36px;
  margin-bottom: var(--s-3);
  border-radius: var(--r-md);
  background: var(--c-bg);
  color: var(--c);
  display: grid; place-items: center;
  transition:
    background var(--dur-med) var(--ease-out),
    color      var(--dur-med) var(--ease-out),
    transform  var(--dur-med) var(--ease-spring);
}
.node .title {
  font-family: var(--font-sans);
  font-weight: var(--weight-semibold);
  font-size: var(--text-lg);
  line-height: var(--leading-tight);
  letter-spacing: var(--track-tight);
  color: var(--fg-default);
  margin-bottom: var(--s-1);
}
.node .sub {
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  font-weight: var(--weight-medium);
}

/* NEW ORDER — left to right: CPaaS → Ads → Marketing → CRM */
.n-cpaas     { --c: var(--c-cpaas);     --c-bg: var(--c-cpaas-bg);     left: 1%;  }
.n-ads       { --c: var(--c-ads);       --c-bg: var(--c-ads-bg);       left: 22%; }
.n-marketing { --c: var(--c-marketing); --c-bg: var(--c-marketing-bg); left: 43%; }
.n-crm       { --c: var(--c-crm);       --c-bg: var(--c-crm-bg);       left: 64%; }

/* ── Channels stack (right of CRM, output in Lead green) ── */
.channels-stack {
  position: absolute;
  left: 85%;
  top: 30%;
  transform: translateY(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  width: 14%;
  min-width: 110px;
}
.channel {
  position: relative;
  background: var(--bg-surface);
  border: 1px solid var(--rule-subtle);
  border-radius: var(--r-md);
  padding: var(--s-1_5) var(--s-3);
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-default);
  font-weight: var(--weight-medium);
  display: flex;
  align-items: center;
  gap: var(--s-2);
  transition:
    border-color var(--dur-med) var(--ease-out),
    background   var(--dur-med) var(--ease-out),
    transform    var(--dur-med) var(--ease-out);
}
.channel .ico {
  width: 18px; height: 18px;
  border-radius: var(--r-xs);
  background: var(--lead-bg);
  color: var(--lead);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.channel.active {
  border-color: var(--lead);
  background: color-mix(in oklab, var(--lead) 6%, var(--bg-surface));
  transform: translateX(2px);
}

/* ── Return loop label ── */
.return-label {
  position: absolute;
  left: 50%;
  bottom: 14%;
  transform: translateX(-50%);
  z-index: 3;
  display: inline-flex;
  align-items: center;
  gap: var(--s-1_5);
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-muted);
  background: var(--paper-50);
  padding: var(--s-1) var(--s-2);
  font-weight: var(--weight-medium);
}
.return-label svg { color: var(--lead); }

/* ── Cloud chip ── */
.cloud-chip {
  position: absolute;
  left: 1%; bottom: 0;
  z-index: 3;
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-muted);
  background: var(--bg-inset);
  border: 1px dashed var(--rule-default);
  border-radius: var(--r-pill);
  padding: var(--s-1_5) var(--s-3);
  font-weight: var(--weight-medium);
}
.cloud-chip .lbl-prod { color: var(--fg-default); font-weight: var(--weight-semibold); }

/* ── Lead ball ── */
.ball {
  position: absolute;
  left: 0; top: 0;
  width: 12px; height: 12px;
  border-radius: var(--r-pill);
  background: var(--lead);
  box-shadow:
    0 0 0 3px color-mix(in oklab, var(--lead) 30%, transparent),
    0 0 12px  color-mix(in oklab, var(--lead) 55%, transparent);
  z-index: 2;
  pointer-events: none;
  will-change: transform, opacity;
}
.ball::after {
  content: "";
  position: absolute; inset: 0;
  border-radius: 99px;
  animation: ping 1.4s ease-out infinite;
}
@keyframes ping {
  0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--lead) 50%, transparent); }
  100% { box-shadow: 0 0 0 14px transparent; }
}

/* ── Particles (Lead green) ── */
.emitter {
  position: absolute; inset: 0;
  pointer-events: none; overflow: visible;
}
.particle {
  position: absolute;
  left: 100%; top: 50%;
  transform: translate(-50%, -50%);
  --dx: 60px; --dy: 0px;
  will-change: transform, opacity;
}
@keyframes drift-out {
  0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1); opacity: 0; }
}
.p-sms   { width: 22px; height: 16px; background: var(--lead); border-radius: 4px 4px 4px 1px; opacity: 0.85; }
.p-rcs   { width: 24px; height: 18px; background: color-mix(in oklab, var(--lead) 70%, white); border-radius: 6px; }
.p-email { width: 24px; height: 16px; background: var(--paper-0); border: 1.5px solid var(--lead); border-radius: 2px; position: relative; }
.p-email::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(to bottom right, transparent 45%, var(--lead) 45%, var(--lead) 55%, transparent 55%);
  opacity: 0.4;
}
.p-voz   { display: flex; gap: 2px; align-items: center; height: 18px; }
.p-voz span {
  width: 2px; background: var(--lead); border-radius: 2px;
  animation: voz 0.8s ease-in-out infinite;
}
.p-voz span:nth-child(1) { height: 6px; }
.p-voz span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.p-voz span:nth-child(3) { height: 18px; animation-delay: 0.2s; }
.p-voz span:nth-child(4) { height: 12px; animation-delay: 0.3s; }
.p-voz span:nth-child(5) { height: 8px;  animation-delay: 0.4s; }
@keyframes voz {
  0%, 100% { transform: scaleY(0.4); }
  50%       { transform: scaleY(1); }
}
.p-wa {
  width: 22px; height: 22px;
  background: var(--lead);
  border-radius: 99px 99px 99px 4px;
  color: white;
  display: grid; place-items: center;
}

/* ── Legend ── */
.legend {
  margin-top: var(--s-10);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: var(--s-5);
  flex-wrap: wrap;
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-muted);
  font-weight: var(--weight-medium);
}
.legend .swatch { display: inline-flex; align-items: center; gap: var(--s-1_5); }
.legend .swatch i {
  width: 8px; height: 8px;
  border-radius: var(--r-pill);
  background: var(--bg);
  display: inline-block;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="stage">

      <div class="canvas" id="canvas">

        <!-- SVG: flow lines + return loops
             viewBox 1600×700; new node centers (same positions, new products):
             CPaaS=168, Ads=504, Marketing=840, CRM=1176
             Channels at left:85% → center ≈ 1472 -->
        <svg class="lines" viewBox="0 0 1600 700" preserveAspectRatio="none">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--ink-300)"/>
            </marker>
          </defs>

          <!-- Forward flow: CPaaS → Ads → Marketing → CRM -->
          <path d="M 168,210 H 504"  fill="none" stroke="var(--ink-200)" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>
          <path d="M 504,210 H 840"  fill="none" stroke="var(--ink-200)" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>
          <path d="M 840,210 H 1176" fill="none" stroke="var(--ink-200)" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>

          <!-- Invisible path the ball follows (CPaaS → CRM) -->
          <path id="fullPath" d="M 168,210 L 504,210 L 840,210 L 1176,210" fill="none" stroke="none"/>

          <!-- Return loops: channels → back to CPaaS (168) and Ads (504) -->
          <path id="returnToCpaas"
                d="M 1472,380 L 1472,500 L 168,500 L 168,260"
                fill="none" stroke="var(--ink-300)" stroke-width="1.2"
                stroke-dasharray="2 6" opacity="0.55"
                vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>
          <path id="returnToAds"
                d="M 1472,360 L 1472,460 L 504,460 L 504,260"
                fill="none" stroke="var(--ink-300)" stroke-width="1.2"
                stroke-dasharray="2 6" opacity="0.55"
                vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>

          <!-- Return dots -->
          <circle id="rpDotCpaas" r="3.5" fill="var(--lead)" opacity="0">
            <animateMotion id="rpAnimCpaas" dur="3.2s" repeatCount="indefinite" begin="indefinite">
              <mpath href="#returnToCpaas"/>
            </animateMotion>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.2s" repeatCount="indefinite" begin="indefinite"/>
          </circle>
          <circle id="rpDotAds" r="3.5" fill="var(--lead)" opacity="0">
            <animateMotion id="rpAnimAds" dur="2.6s" repeatCount="indefinite" begin="indefinite">
              <mpath href="#returnToAds"/>
            </animateMotion>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" repeatCount="indefinite" begin="indefinite"/>
          </circle>
        </svg>

        <!-- Return label -->
        <div class="return-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
          </svg>
          dados de retorno · engajamento · conversão
        </div>

        <!-- ── NODES: CPaaS → Ads → Marketing → CRM ── -->

        <!-- 1: CPaaS (Omnichannel) — official purple arrow-up icon -->
        <div class="node n-cpaas" id="n-cpaas">
          <div class="ico">
            <svg width="20" height="20" viewBox="67 67 88 88" xmlns="http://www.w3.org/2000/svg">
              <path d="M71.5 137.397H91.5635C93.7579 137.397 95.8479 138.388 97.2064 140.107L104.312 149.072C105.305 150.322 106.716 151 108.231 151C108.806 151 109.38 150.896 109.903 150.739C111.94 150.01 113.299 148.186 113.299 145.997V114.049L119.203 119.938L122.547 116.603L114.71 108.785C113.665 107.743 112.306 107.169 110.843 107.169C109.38 107.169 108.022 107.743 106.977 108.785L99.1396 116.603L102.483 119.938L108.649 113.788V145.945C108.649 146.049 108.649 146.153 108.44 146.257C108.231 146.309 108.126 146.257 108.074 146.153L100.968 137.189C98.7216 134.322 95.3254 132.655 91.668 132.655H79.8598L111.052 80.1726L142.245 132.655H125.786V137.345H150.5L111.052 71L71.6045 137.345L71.5 137.397Z" fill="currentColor"/>
            </svg>
          </div>
          <div class="title">CPaaS</div>
          <div class="sub">Omnichannel</div>
        </div>

        <!-- 2: Ads (Aquisição) — official yellow S-curve icon -->
        <div class="node n-ads" id="n-ads">
          <div class="ico">
            <svg width="20" height="20" viewBox="71 67 80 88" xmlns="http://www.w3.org/2000/svg">
              <path d="M81.2954 129.019C77.503 134.78 75.5 141.486 75.5 148.41V151H146.5V148.41C146.5 128.892 130.574 113.012 111 113.012C100.818 113.012 92.5285 104.752 92.5285 94.5931C92.5285 84.4341 100.812 76.1745 111 76.1745C120.253 76.1745 127.936 82.9951 129.264 91.8591L121.182 87.2602L118.608 91.7612L129.229 97.8106C130.176 98.3516 131.203 98.6049 132.225 98.6049C134.332 98.6049 136.381 97.5113 137.501 95.56L143.568 84.9694L139.054 82.4023L134.326 90.6618C132.439 79.5128 122.701 71 111 71C97.9545 71 87.3333 81.5849 87.3333 94.5988C87.3333 107.613 97.9487 118.198 111 118.198C126.834 118.198 139.873 130.371 141.195 145.826H80.8048C81.232 140.841 82.8828 136.058 85.642 131.862L81.2954 129.019Z" fill="currentColor"/>
            </svg>
          </div>
          <div class="title">Ads</div>
          <div class="sub">Aquisição</div>
        </div>

        <!-- 3: Marketing (Nutrição) — official pink lightning icon -->
        <div class="node n-marketing" id="n-marketing">
          <div class="ico">
            <svg width="20" height="20" viewBox="72 66 78 89" xmlns="http://www.w3.org/2000/svg">
              <path d="M114.219 101.305L136.649 101.656L110.447 137.188V123.025C110.447 118.321 106.574 114.467 101.847 114.467H85.8039L113.414 79.4358L114.621 86.5922L119.097 85.8416L117.286 75.3822C116.784 72.5296 114.068 70.5779 111.201 71.0783L100.69 72.8799L101.445 77.3339L110.547 75.7826L76.5 119.021H101.847C104.06 119.021 105.921 120.823 105.921 123.075V151L145.5 97.4019L114.269 96.9015V101.406L114.219 101.305Z" fill="currentColor"/>
            </svg>
          </div>
          <div class="title">Marketing</div>
          <div class="sub">Nutrição</div>
        </div>

        <!-- 4: CRM (Base de dados) — official orange house icon -->
        <div class="node n-crm" id="n-crm">
          <div class="ico">
            <svg width="20" height="20" viewBox="65 66 92 89" xmlns="http://www.w3.org/2000/svg">
              <path d="M147.369 93.9663L118.929 73.5518C114.218 70.1494 107.84 70.1494 103.129 73.5518L74.5732 94.3123C71.0684 96.8497 69 100.944 69 105.333V148.353H74.171V105.333C74.171 102.622 75.4925 100.085 77.6183 98.5278L106.174 77.7616C109.104 75.6279 113.011 75.6279 115.941 77.7616L144.382 98.1761C146.565 99.7331 147.886 102.27 147.886 104.981V145.752H101.347V115.765C101.347 114.496 102.382 113.458 103.646 113.458H117.607C118.871 113.458 119.906 114.496 119.906 115.765V129.086L113.126 122.281L109.449 125.972L118.067 134.622C119.216 135.776 120.71 136.41 122.319 136.41C123.927 136.41 125.421 135.776 126.57 134.622L135.189 125.972L131.512 122.281L125.019 128.798V115.822C125.019 111.67 121.687 108.326 117.55 108.326H103.588C99.4514 108.326 96.119 111.67 96.119 115.822V151H153V105.039C153 100.656 150.874 96.5614 147.312 93.9663H147.369Z" fill="currentColor"/>
            </svg>
          </div>
          <div class="title">CRM</div>
          <div class="sub">Base de dados</div>
        </div>

        <!-- Channels (to the right of CRM, output in Lead green) -->
        <div class="channels-stack">
          <div class="channel" id="ch-sms" data-channel="sms">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
            SMS
            <div class="emitter" data-channel="sms"></div>
          </div>
          <div class="channel" id="ch-rcs" data-channel="rcs">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M7 9h10M7 13h6"/></svg></span>
            RCS
            <div class="emitter" data-channel="rcs"></div>
          </div>
          <div class="channel" id="ch-email" data-channel="email">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span>
            E-mail
            <div class="emitter" data-channel="email"></div>
          </div>
          <div class="channel" id="ch-voz" data-channel="voz">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1 1 .3 2 .6 2.9a2 2 0 0 1-.5 2.1L8 9.8a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.5c.9.3 1.9.5 2.9.6a2 2 0 0 1 1.7 2z"/></svg></span>
            Voz
            <div class="emitter" data-channel="voz"></div>
          </div>
          <div class="channel" id="ch-wa" data-channel="wa">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-1 4 8.5 8.5 0 0 1-7.5 4.5A8.4 8.4 0 0 1 8.5 19l-5.5 1.5L4.5 15a8.4 8.4 0 0 1-1-4 8.5 8.5 0 0 1 4.5-7.5 8.4 8.4 0 0 1 4-1 8.5 8.5 0 0 1 8.5 8.5z"/></svg></span>
            WhatsApp
            <div class="emitter" data-channel="wa"></div>
          </div>
        </div>

        <!-- Cloud chip -->
        <div class="cloud-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--c-cloud)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <path d="M17 18 a4 4 0 0 0 0 -8 a6 6 0 0 0 -11 1 a4 4 0 0 0 1 7"/>
            <path d="M12 13 v6 M9 16 l3 3 3 -3"/>
          </svg>
          <span class="lbl-prod">Cloud</span>
          <span>· Solução White Label</span>
        </div>

      </div>

      <!-- Legend in new order: CPaaS → Ads → Marketing → CRM → Lead -->
      <div class="legend">
        <span class="swatch" style="--bg: var(--c-cpaas)"><i></i> CPaaS</span>
        <span class="swatch" style="--bg: var(--c-ads)"><i></i> Ads</span>
        <span class="swatch" style="--bg: var(--c-marketing)"><i></i> Marketing</span>
        <span class="swatch" style="--bg: var(--c-crm)"><i></i> CRM</span>
        <span class="swatch" style="--bg: var(--lead)"><i></i> Lead</span>
      </div>

    </div>
  </div>

<script>
(function () {
  const canvas   = document.getElementById('canvas');
  const fullPath = document.getElementById('fullPath');

  // ── Single ball: linear left-to-right (CPaaS → CRM) ──
  const ball = document.createElement('div');
  ball.className = 'ball';
  ball.style.opacity = '0';
  canvas.appendChild(ball);

  let totalLength = 0;
  function recalc() {
    try { totalLength = fullPath.getTotalLength(); } catch (e) { totalLength = 0; }
  }
  recalc();
  window.addEventListener('resize', recalc);

  const CYCLE_MS = 9000;
  const startTime = performance.now();

  // Node ranges along the path (viewBox 1600, path x: 168→1176, total=1008)
  // New order: n-cpaas=168, n-ads=504, n-marketing=840, n-crm=1176
  function nodeRange(cx) {
    const half = 120;
    return { enter: (cx - half - 168) / 1008, exit: (cx + half - 168) / 1008 };
  }
  const NODE_RANGES = [
    { id: 'n-cpaas',     ...nodeRange(168)  },
    { id: 'n-ads',       ...nodeRange(504)  },
    { id: 'n-marketing', ...nodeRange(840)  },
    { id: 'n-crm',       ...nodeRange(1176) },
  ];

  function nodeAtT(t) {
    for (const r of NODE_RANGES) {
      if (t >= r.enter && t <= r.exit) return r.id;
    }
    return null;
  }

  function pulseNode(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('active');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('active'), 700);
  }

  const CHANNELS = ['ch-sms', 'ch-rcs', 'ch-email', 'ch-voz', 'ch-wa'];
  function fanOutChannels() {
    let i = 0;
    const iv = setInterval(() => {
      const ch = document.getElementById(CHANNELS[i]);
      if (ch) {
        ch.classList.add('active');
        clearTimeout(ch._t);
        ch._t = setTimeout(() => ch.classList.remove('active'), 600);
      }
      i++;
      if (i >= CHANNELS.length) clearInterval(iv);
    }, 110);
  }

  let lastNode = null;

  function tick(now) {
    const t = ((now - startTime) % CYCLE_MS) / CYCLE_MS;

    if (totalLength > 0) {
      const rect = canvas.getBoundingClientRect();
      const pt = fullPath.getPointAtLength(totalLength * t);
      const px = (pt.x / 1600) * rect.width;
      const py = (pt.y / 700)  * rect.height;
      ball.style.transform = `translate(${px}px, ${py}px) translate(-50%, -50%)`;

      // Fade in at start, fade out near end
      let opacity = 1;
      if (t < 0.03)      opacity = t / 0.03;
      else if (t > 0.92) opacity = (1 - t) / 0.08;
      ball.style.opacity = String(Math.max(0, Math.min(1, opacity)));

      // Pulse node on entry; fan-out when ball reaches CRM (last node)
      const here = nodeAtT(t);
      if (here !== lastNode) {
        if (here) {
          pulseNode(here);
          if (here === 'n-crm') fanOutChannels();
        }
        lastNode = here;
      }
    } else {
      recalc();
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── Particle emitters ──
  const ICONS = {
    sms:   () => `<div class="p-sms"></div>`,
    rcs:   () => `<div class="p-rcs"></div>`,
    email: () => `<div class="p-email"></div>`,
    voz:   () => `<div class="p-voz"><span></span><span></span><span></span><span></span><span></span></div>`,
    wa:    () => `<div class="p-wa"><svg width="12" height="10" viewBox="0 0 14 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,5 4,8 9,2"/></svg></div>`,
  };
  function spawn(em, kind) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerHTML = ICONS[kind]();
    const a = (-10 + Math.random() * 20) * Math.PI / 180;
    const dist = 50 + Math.random() * 20;
    p.style.setProperty('--dx', (Math.cos(a) * dist).toFixed(0) + 'px');
    p.style.setProperty('--dy', (Math.sin(a) * dist).toFixed(0) + 'px');
    p.style.animation = `drift-out ${1500 + Math.random() * 400}ms cubic-bezier(0.22,0.8,0.30,1) forwards`;
    em.appendChild(p);
    setTimeout(() => p.remove(), 2200);
  }
  CHANNELS.forEach(id => {
    const ch = document.getElementById(id);
    if (!ch) return;
    new MutationObserver(() => {
      if (ch.classList.contains('active')) {
        const em = ch.querySelector('.emitter');
        if (em) {
          spawn(em, em.dataset.channel);
          if (Math.random() < 0.5) setTimeout(() => spawn(em, em.dataset.channel), 120);
        }
      }
    }).observe(ch, { attributes: true, attributeFilter: ['class'] });
  });

  // ── Start return-loop SVG animations ──
  window.addEventListener('load', () => {
    const aCpaas = document.getElementById('rpAnimCpaas');
    const aAds   = document.getElementById('rpAnimAds');
    if (aCpaas) aCpaas.beginElement();
    if (aAds)   aAds.beginElement();
  });
})();
</script>
</body>
</html>
