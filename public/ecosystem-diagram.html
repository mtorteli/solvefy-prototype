<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ecossistema Solvefy</title>
<style>
/* ── Pacaembu (served from same origin) ── */
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Regular.woff2') format('woff2'),
       url('/fonts/Pacaembu-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Medium.ttf') format('truetype');
  font-weight: 500; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'Pacaembu';
  src: url('/fonts/Pacaembu-Black.woff2') format('woff2'),
       url('/fonts/Pacaembu-Black.ttf') format('truetype');
  font-weight: 900; font-style: normal; font-display: swap;
}

/* ── Design tokens ── */
:root {
  --ink-200:  #B6B9BC;
  --ink-300:  #8A8E92;
  --ink-400:  #5A5E62;
  --ink-900:  #0B0D0E;

  --paper-0:   #FFFFFF;
  --paper-50:  #FBFAF7;
  --paper-100: #F7F5F2;
  --paper-200: #F0EEE9;
  --paper-300: #E5E3DE;
  --paper-400: #D6D3CC;

  --bg-surface: var(--paper-0);
  --bg-inset:   var(--paper-100);

  --fg-default: var(--ink-900);
  --fg-muted:   var(--ink-400);
  --fg-subtle:  var(--ink-300);

  --rule-subtle:  var(--paper-300);
  --rule-default: var(--paper-400);

  /* product palette */
  --brand-crm:          #E1611C;
  --brand-crm-bg:       #FFDAC6;
  --brand-ads:          #F0A800;
  --brand-ads-bg:       #FFF7E5;
  --brand-marketing:    #E64499;
  --brand-marketing-bg: #FFE9F5;
  --brand-cpaas:        #9C7BFF;
  --brand-cpaas-bg:     #E7DBFF;
  --brand-cloud:        #00CBFF;
  --brand-cloud-bg:     #C6E8F1;
  --brand-lead:         #00DF71;

  /* local aliases */
  --c-crm:          var(--brand-crm);
  --c-crm-bg:       var(--brand-crm-bg);
  --c-ads:          var(--brand-ads);
  --c-ads-bg:       var(--brand-ads-bg);
  --c-marketing:    var(--brand-marketing);
  --c-marketing-bg: var(--brand-marketing-bg);
  --c-cpaas:        var(--brand-cpaas);
  --c-cpaas-bg:     var(--brand-cpaas-bg);
  --c-cloud:        var(--brand-cloud);
  --c-cloud-bg:     var(--brand-cloud-bg);
  --lead:           var(--brand-lead);

  /* typography — all Pacaembu */
  --font-sans: 'Pacaembu', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Pacaembu', ui-monospace, monospace;

  --text-2xs: 11px;
  --text-xs:  12px;
  --text-lg:  18px;

  --leading-tight:   1.08;
  --track-tight:    -0.02em;
  --track-caps:      0.08em;

  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 700;

  --s-1:    4px;
  --s-1_5:  6px;
  --s-2:    8px;
  --s-3:    12px;
  --s-4:    16px;
  --s-5:    20px;
  --s-6:    24px;
  --s-8:    32px;
  --s-10:   40px;

  --r-xs: 3px;
  --r-sm: 5px;
  --r-md: 6px;
  --r-lg: 10px;
  --r-pill: 9999px;

  --ease-out:    cubic-bezier(0.22, 0.8, 0.30, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-med:  200ms;
  --dur-slow: 400ms;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
}
body {
  font-family: var(--font-sans);
  color: var(--fg-default);
  -webkit-font-smoothing: antialiased;
}

.wrap { width: 100%; }

/* ── Stage (transparent, borderless) ── */
.stage {
  position: relative;
  width: 100%;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: var(--s-8) var(--s-6) var(--s-10);
  overflow: visible;
}

/* ── Canvas ── */
.canvas {
  position: relative;
  width: 100%;
  height: 460px;
}

.lines {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* ── Nodes ── */
.node {
  position: absolute;
  top: 30%;
  transform: translateY(-50%);
  z-index: 4;
  background: var(--bg-surface);
  border: 1px solid var(--rule-subtle);
  border-radius: var(--r-lg);
  width: 19%;
  padding: var(--s-5);
  text-align: left;
  transition:
    box-shadow var(--dur-slow) var(--ease-out),
    transform   var(--dur-slow) var(--ease-out),
    border-color var(--dur-med) var(--ease-out),
    background  var(--dur-med) var(--ease-out);
}
.node::before {
  content: "";
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--c);
  border-radius: var(--r-lg) 0 0 var(--r-lg);
  transition: width var(--dur-med) var(--ease-out);
}
.node.active {
  border-color: var(--c);
  background: color-mix(in oklab, var(--c-bg) 55%, var(--bg-surface));
  box-shadow: 0 0 0 4px color-mix(in oklab, var(--c) 18%, transparent);
  transform: translateY(-50%) translateY(-3px);
}
.node.active::before { width: 5px; }
.node.active .ico {
  background: var(--c);
  color: var(--paper-0);
  transform: scale(1.05);
}
.node .ico {
  width: 36px; height: 36px;
  margin-bottom: var(--s-3);
  border-radius: var(--r-md);
  background: var(--c-bg);
  color: var(--c);
  display: grid; place-items: center;
  transition:
    background var(--dur-med) var(--ease-out),
    color var(--dur-med) var(--ease-out),
    transform var(--dur-med) var(--ease-spring);
}
.node .title {
  font-family: var(--font-sans);
  font-weight: var(--weight-semibold);
  font-size: var(--text-lg);
  line-height: var(--leading-tight);
  letter-spacing: var(--track-tight);
  color: var(--fg-default);
  margin-bottom: var(--s-1);
}
.node .sub {
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  font-weight: var(--weight-medium);
}

.n-crm       { --c: var(--c-crm);       --c-bg: var(--c-crm-bg);       left: 1%;  }
.n-marketing { --c: var(--c-marketing); --c-bg: var(--c-marketing-bg); left: 22%; }
.n-ads       { --c: var(--c-ads);       --c-bg: var(--c-ads-bg);       left: 43%; }
.n-cpaas     { --c: var(--c-cpaas);     --c-bg: var(--c-cpaas-bg);     left: 64%; }

/* ── Channels stack ── */
.channels-stack {
  position: absolute;
  left: 85%;
  top: 30%;
  transform: translateY(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  width: 14%;
  min-width: 110px;
}
.channel {
  position: relative;
  background: var(--bg-surface);
  border: 1px solid var(--rule-subtle);
  border-radius: var(--r-md);
  padding: var(--s-1_5) var(--s-3);
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-default);
  font-weight: var(--weight-medium);
  display: flex;
  align-items: center;
  gap: var(--s-2);
  transition:
    border-color var(--dur-med) var(--ease-out),
    background  var(--dur-med) var(--ease-out),
    transform   var(--dur-med) var(--ease-out);
}
.channel .ico {
  width: 18px; height: 18px;
  border-radius: var(--r-xs);
  background: var(--c-cpaas-bg);
  color: var(--c-cpaas);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.channel.active {
  border-color: var(--c-cpaas);
  background: color-mix(in oklab, var(--c-cpaas) 6%, var(--bg-surface));
  transform: translateX(2px);
}

/* ── Return loop label ── */
.return-label {
  position: absolute;
  left: 50%;
  bottom: 14%;
  transform: translateX(-50%);
  z-index: 3;
  display: inline-flex;
  align-items: center;
  gap: var(--s-1_5);
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-muted);
  background: var(--paper-50);
  padding: var(--s-1) var(--s-2);
  font-weight: var(--weight-medium);
}
.return-label svg { color: var(--lead); }

/* ── Cloud chip ── */
.cloud-chip {
  position: absolute;
  left: 1%;
  bottom: 0;
  z-index: 3;
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-muted);
  background: var(--bg-inset);
  border: 1px dashed var(--rule-default);
  border-radius: var(--r-pill);
  padding: var(--s-1_5) var(--s-3);
  font-weight: var(--weight-medium);
}
.cloud-chip .dot {
  width: 6px; height: 6px;
  border-radius: var(--r-pill);
  background: var(--c-cloud);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--c-cloud) 22%, transparent);
}
.cloud-chip .lbl-prod {
  color: var(--fg-default);
  font-weight: var(--weight-semibold);
}

/* ── Lead ball ── */
.ball {
  position: absolute;
  left: 0; top: 0;
  width: 12px; height: 12px;
  border-radius: var(--r-pill);
  background: var(--lead);
  box-shadow:
    0 0 0 3px color-mix(in oklab, var(--lead) 30%, transparent),
    0 0 12px color-mix(in oklab, var(--lead) 55%, transparent);
  z-index: 2;
  pointer-events: none;
  will-change: transform, opacity;
}
.ball::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 99px;
  animation: ping 1.4s ease-out infinite;
}
@keyframes ping {
  0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--lead) 50%, transparent); }
  100% { box-shadow: 0 0 0 14px transparent; }
}

/* ── Particles ── */
.emitter {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
}
.particle {
  position: absolute;
  left: 100%; top: 50%;
  transform: translate(-50%, -50%);
  --dx: 60px; --dy: 0px;
  will-change: transform, opacity;
}
@keyframes drift-out {
  0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1); opacity: 0; }
}
.p-sms   { width: 22px; height: 16px; background: var(--c-cpaas); border-radius: 4px 4px 4px 1px; opacity: 0.85; }
.p-rcs   { width: 24px; height: 18px; background: color-mix(in oklab, var(--c-cpaas) 70%, white); border-radius: 6px; }
.p-email { width: 24px; height: 16px; background: var(--paper-0); border: 1.5px solid var(--c-cpaas); border-radius: 2px; position: relative; }
.p-email::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(to bottom right, transparent 45%, var(--c-cpaas) 45%, var(--c-cpaas) 55%, transparent 55%);
  opacity: 0.4;
}
.p-voz   { display: flex; gap: 2px; align-items: center; height: 18px; }
.p-voz span {
  width: 2px; background: var(--c-cpaas); border-radius: 2px;
  animation: voz 0.8s ease-in-out infinite;
}
.p-voz span:nth-child(1) { height: 6px; }
.p-voz span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.p-voz span:nth-child(3) { height: 18px; animation-delay: 0.2s; }
.p-voz span:nth-child(4) { height: 12px; animation-delay: 0.3s; }
.p-voz span:nth-child(5) { height: 8px;  animation-delay: 0.4s; }
@keyframes voz {
  0%, 100% { transform: scaleY(0.4); }
  50%       { transform: scaleY(1); }
}
.p-wa {
  width: 22px; height: 22px;
  background: var(--c-cpaas);
  border-radius: 99px 99px 99px 4px;
  color: white;
  display: grid; place-items: center;
}

/* ── Legend ── */
.legend {
  margin-top: var(--s-10);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: var(--s-5);
  flex-wrap: wrap;
  font-family: var(--font-sans);
  font-size: var(--text-2xs);
  text-transform: uppercase;
  letter-spacing: var(--track-caps);
  color: var(--fg-muted);
  font-weight: var(--weight-medium);
}
.legend .swatch { display: inline-flex; align-items: center; gap: var(--s-1_5); }
.legend .swatch i {
  width: 8px; height: 8px;
  border-radius: var(--r-pill);
  background: var(--bg);
  display: inline-block;
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="stage">

      <div class="canvas" id="canvas">

        <!-- SVG: flow lines + return loops -->
        <svg class="lines" viewBox="0 0 1600 700" preserveAspectRatio="none">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--ink-300)"/>
            </marker>
          </defs>

          <!-- Forward flow lines -->
          <path d="M 168,210 H 504" fill="none" stroke="var(--ink-200)" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>
          <path d="M 504,210 H 840" fill="none" stroke="var(--ink-200)" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>
          <path d="M 840,210 H 1176" fill="none" stroke="var(--ink-200)" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>

          <!-- Path used for ball positioning -->
          <path id="fullPath" d="M 168,210 L 504,210 L 840,210 L 1176,210" fill="none" stroke="none"/>

          <!-- Return loops -->
          <path id="returnToMkt"
                d="M 1472,360 L 1472,460 L 504,460 L 504,260"
                fill="none" stroke="var(--ink-300)" stroke-width="1.2"
                stroke-dasharray="2 6" opacity="0.55"
                vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>
          <path id="returnToCrm"
                d="M 1472,380 L 1472,500 L 168,500 L 168,260"
                fill="none" stroke="var(--ink-300)" stroke-width="1.2"
                stroke-dasharray="2 6" opacity="0.55"
                vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>

          <!-- Return dots -->
          <circle id="rpDotMkt" r="3.5" fill="var(--lead)" opacity="0">
            <animateMotion id="rpAnimMkt" dur="2.6s" repeatCount="indefinite" begin="indefinite">
              <mpath href="#returnToMkt"/>
            </animateMotion>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" repeatCount="indefinite" begin="indefinite"/>
          </circle>
          <circle id="rpDotCrm" r="3.5" fill="var(--lead)" opacity="0">
            <animateMotion id="rpAnimCrm" dur="3.2s" repeatCount="indefinite" begin="indefinite">
              <mpath href="#returnToCrm"/>
            </animateMotion>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.2s" repeatCount="indefinite" begin="indefinite"/>
          </circle>
        </svg>

        <!-- Return label -->
        <div class="return-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          dados de retorno · engajamento · conversão
        </div>

        <!-- Nodes -->
        <div class="node n-crm" id="n-crm">
          <div class="ico">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 11 L12 4 L21 11 V20 a1 1 0 0 1 -1 1 H4 a1 1 0 0 1 -1 -1 Z"/>
              <path d="M16 13 v3 h-5"/><path d="M14 14 l-3 2 3 2"/>
            </svg>
          </div>
          <div class="title">CRM</div>
          <div class="sub">Base de dados</div>
        </div>

        <div class="node n-marketing" id="n-marketing">
          <div class="ico">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 3 L5 13 h6 L9 21 L19 10 h-6 Z"/>
              <path d="M16 6 l3 -3 M19 3 v3 M19 3 h-3"/>
            </svg>
          </div>
          <div class="title">Marketing</div>
          <div class="sub">Nutrição</div>
        </div>

        <div class="node n-ads" id="n-ads">
          <div class="ico">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 5 a4 4 0 0 0 -4 -2 H10 a4 4 0 0 0 0 8 h4 a4 4 0 0 1 0 8 h-4 a4 4 0 0 1 -4 -4"/>
              <path d="M9 22 l-3 -3 3 -3"/>
            </svg>
          </div>
          <div class="title">Ads</div>
          <div class="sub">Aquisição</div>
        </div>

        <div class="node n-cpaas" id="n-cpaas">
          <div class="ico">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3 L21 20 H3 Z"/>
              <path d="M12 16 V10"/><path d="M9 13 L12 10 L15 13"/>
            </svg>
          </div>
          <div class="title">CPaaS</div>
          <div class="sub">Omnichannel</div>
        </div>

        <!-- Channels -->
        <div class="channels-stack">
          <div class="channel" id="ch-sms" data-channel="sms">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
            SMS
            <div class="emitter" data-channel="sms"></div>
          </div>
          <div class="channel" id="ch-rcs" data-channel="rcs">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M7 9h10M7 13h6"/></svg></span>
            RCS
            <div class="emitter" data-channel="rcs"></div>
          </div>
          <div class="channel" id="ch-email" data-channel="email">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span>
            E-mail
            <div class="emitter" data-channel="email"></div>
          </div>
          <div class="channel" id="ch-voz" data-channel="voz">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1 1 .3 2 .6 2.9a2 2 0 0 1-.5 2.1L8 9.8a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.5c.9.3 1.9.5 2.9.6a2 2 0 0 1 1.7 2z"/></svg></span>
            Voz
            <div class="emitter" data-channel="voz"></div>
          </div>
          <div class="channel" id="ch-wa" data-channel="wa">
            <span class="ico"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-1 4 8.5 8.5 0 0 1-7.5 4.5A8.4 8.4 0 0 1 8.5 19l-5.5 1.5L4.5 15a8.4 8.4 0 0 1-1-4 8.5 8.5 0 0 1 4.5-7.5 8.4 8.4 0 0 1 4-1 8.5 8.5 0 0 1 8.5 8.5z"/></svg></span>
            WhatsApp
            <div class="emitter" data-channel="wa"></div>
          </div>
        </div>

        <!-- Cloud chip -->
        <div class="cloud-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--c-cloud)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <path d="M17 18 a4 4 0 0 0 0 -8 a6 6 0 0 0 -11 1 a4 4 0 0 0 1 7"/>
            <path d="M12 13 v6 M9 16 l3 3 3 -3"/>
          </svg>
          <span class="lbl-prod">Cloud</span>
          <span>· Solução White Label</span>
        </div>

      </div>

      <!-- Legend (no speed controls) -->
      <div class="legend">
        <span class="swatch" style="--bg: var(--c-crm)"><i></i> CRM</span>
        <span class="swatch" style="--bg: var(--c-marketing)"><i></i> Marketing</span>
        <span class="swatch" style="--bg: var(--c-ads)"><i></i> Ads</span>
        <span class="swatch" style="--bg: var(--c-cpaas)"><i></i> CPaaS</span>
        <span class="swatch" style="--bg: var(--lead)"><i></i> Lead</span>
      </div>

    </div>
  </div>

<script>
(function () {
  const canvas   = document.getElementById('canvas');
  const fullPath = document.getElementById('fullPath');

  // ── Single ball: linear L→R with fade-in / fade-out ──
  const ball = document.createElement('div');
  ball.className = 'ball';
  ball.style.opacity = '0';
  canvas.appendChild(ball);

  let totalLength = 0;
  function recalc() {
    try { totalLength = fullPath.getTotalLength(); } catch (e) { totalLength = 0; }
  }
  recalc();
  window.addEventListener('resize', recalc);

  const CYCLE_MS = 9000; // traversal duration (fixed speed)
  const startTime = performance.now();

  // t ranges for each node centre (viewBox 1600, path from x=168 to x=1176, length=1008)
  function nodeRange(cx) {
    const half = 120; // slightly narrower than original so pulse doesn't stay long
    return { enter: (cx - half - 168) / 1008, exit: (cx + half - 168) / 1008 };
  }
  const NODE_RANGES = [
    { id: 'n-crm',       ...nodeRange(168)  },
    { id: 'n-marketing', ...nodeRange(504)  },
    { id: 'n-ads',       ...nodeRange(840)  },
    { id: 'n-cpaas',     ...nodeRange(1176) },
  ];
  function nodeAtT(t) {
    for (const r of NODE_RANGES) {
      if (t >= r.enter && t <= r.exit) return r.id;
    }
    return null;
  }
  function pulseNode(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('active');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('active'), 700);
  }

  const CHANNELS = ['ch-sms', 'ch-rcs', 'ch-email', 'ch-voz', 'ch-wa'];
  function fanOutChannels() {
    let i = 0;
    const iv = setInterval(() => {
      const ch = document.getElementById(CHANNELS[i]);
      if (ch) {
        ch.classList.add('active');
        clearTimeout(ch._t);
        ch._t = setTimeout(() => ch.classList.remove('active'), 600);
      }
      i++;
      if (i >= CHANNELS.length) clearInterval(iv);
    }, 110);
  }

  let lastNode = null;

  function tick(now) {
    const elapsed = now - startTime;
    const t = (elapsed % CYCLE_MS) / CYCLE_MS; // 0..1, linear, left-to-right

    if (totalLength > 0) {
      const rect = canvas.getBoundingClientRect();

      const pt = fullPath.getPointAtLength(totalLength * t);
      const px = (pt.x / 1600) * rect.width;
      const py = (pt.y / 700)  * rect.height;
      ball.style.transform = `translate(${px}px, ${py}px) translate(-50%, -50%)`;

      // Smooth fade: appear at t=0.03, disappear near t=0.96
      let opacity = 1;
      if (t < 0.03)      opacity = t / 0.03;
      else if (t > 0.92) opacity = (1 - t) / 0.08;
      ball.style.opacity = String(Math.max(0, Math.min(1, opacity)));

      // Node pulse on entry
      const here = nodeAtT(t);
      if (here !== lastNode) {
        if (here) {
          pulseNode(here);
          if (here === 'n-cpaas') fanOutChannels();
        }
        lastNode = here;
      }
    } else {
      recalc();
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ── Particle emitters ──
  const ICONS = {
    sms:   () => `<div class="p-sms"></div>`,
    rcs:   () => `<div class="p-rcs"></div>`,
    email: () => `<div class="p-email"></div>`,
    voz:   () => `<div class="p-voz"><span></span><span></span><span></span><span></span><span></span></div>`,
    wa:    () => `<div class="p-wa"><svg width="12" height="10" viewBox="0 0 14 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,5 4,8 9,2"/></svg></div>`,
  };
  function spawn(em, kind) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.innerHTML = ICONS[kind]();
    const a = (-10 + Math.random() * 20) * Math.PI / 180;
    const dist = 50 + Math.random() * 20;
    p.style.setProperty('--dx', (Math.cos(a) * dist).toFixed(0) + 'px');
    p.style.setProperty('--dy', (Math.sin(a) * dist).toFixed(0) + 'px');
    p.style.animation = `drift-out ${1500 + Math.random() * 400}ms cubic-bezier(0.22,0.8,0.30,1) forwards`;
    em.appendChild(p);
    setTimeout(() => p.remove(), 2200);
  }
  CHANNELS.forEach(id => {
    const ch = document.getElementById(id);
    if (!ch) return;
    new MutationObserver(() => {
      if (ch.classList.contains('active')) {
        const em = ch.querySelector('.emitter');
        if (em) {
          spawn(em, em.dataset.channel);
          if (Math.random() < 0.5) setTimeout(() => spawn(em, em.dataset.channel), 120);
        }
      }
    }).observe(ch, { attributes: true, attributeFilter: ['class'] });
  });

  // ── Start return-loop SVG animations ──
  window.addEventListener('load', () => {
    const mkt = document.getElementById('rpAnimMkt');
    const crm = document.getElementById('rpAnimCrm');
    if (mkt) mkt.beginElement();
    if (crm) crm.beginElement();
  });
})();
</script>
</body>
</html>
